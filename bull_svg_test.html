<!DOCTYPE html>

<head>
<style>
  body { background: #050505; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  svg { width: 400px; height: 400px; }
  .wire { stroke: #b44fff; stroke-width: 0.8; fill: none; opacity: 0.8; }
  .dot { fill: #00f5e4; }
</style>

<svg viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.4" result="coloredBlur"/>

        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Profile (Tracing the exact contour) -->
  <path class="wire" d="M50 35 L42 30 L35 38 L25 35 L5 10 L15 35 L32 46 L20 50 L28 55 L35 65 L44 88 L42 95 L50 98 L58 95 L56 88 L65 65 L72 55 L80 50 L68 46 L85 35 L95 10 L75 35 L65 38 L58 30 Z" style="filter: url(#glow);" />

  <path class="wire" d="M20 50 L35 65 M80 50 L65 65" />
  
  <!-- Vertices (Dots) -->
  <circle class="dot" cx="50" cy="35" r="0.7" />
